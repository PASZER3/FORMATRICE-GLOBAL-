<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Welcome 👋</h1>
        <p>This is my modern website</p>

        <img src="https://picsum.photos/300" alt="image">

        <button onclick="alert('Button clicked!')">Click Me</button>
        <button onclick="alert('Welcome to my site!')">Login</button>

    </div>

</body>
</html>
