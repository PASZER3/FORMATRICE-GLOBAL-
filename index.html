<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formatice Global | Precision Mould Design & Tooling Engineering Mumbai</title>
<meta name="description" content="Mumbai's premier plastic injection moulding (IM) & extrusion blow moulding (EBM) engineering firm. Expert DFM, Mouldflow simulation, mould design & on-floor support. Antop Hill, Dadar.">
<meta name="keywords" content="plastic injection moulding Mumbai, EBM tooling India, mould design Dadar, DFM analysis Mumbai, mouldflow simulation India, tooling engineering Maharashtra">
<meta property="og:title" content="Formatice Global | Precision Moulding Engineering Mumbai">
<meta property="og:description" content="Expert IM & EBM engineering solutions from Mumbai. Part design, DFM, Mouldflow, Mould Design, Electrode Design & on-floor support.">
<meta property="og:type" content="website">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
</style>

<style>
:root {
  --navy: #0a0f2e;
  --navy-mid: #111840;
  --blue: #1a56db;
  --blue-light: #2d6ef5;
  --gold: #f5a623;
  --gold-light: #ffc145;
  --white: #ffffff;
  --off-white: #f4f6fb;
  --gray: #8892a4;
  --text: #1c2340;
  --card-bg: #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--white);
  color: var(--text);
  overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 999;
  padding: 0 5%;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 15, 46, 0.96);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  transition: all 0.3s;
}

.logo {
  font-family: 'Syne', Georgia, serif;
  font-weight: 800;
  font-size: 1.35rem;
  color: var(--white);
  letter-spacing: -0.3px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

nav { display: flex; align-items: center; gap: 32px; }

nav a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.2px;
  transition: color 0.2s;
}

nav a:hover { color: var(--white); }

.nav-cta {
  background: var(--gold);
  color: var(--navy) !important;
  padding: 10px 22px;
  border-radius: 6px;
  font-weight: 700 !important;
  font-size: 0.88rem !important;
  transition: background 0.2s, transform 0.2s !important;
}

.nav-cta:hover {
  background: var(--gold-light) !important;
  transform: translateY(-1px);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  width: 24px; height: 2px;
  background: white;
  border-radius: 2px;
  transition: all 0.3s;
}

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 120px 5% 80px;
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,86,219,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,86,219,0.08) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-glow {
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(26,86,219,0.25) 0%, transparent 70%);
  top: -100px; right: -100px;
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%);
  bottom: 0; left: 20%;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,166,35,0.12);
  border: 1px solid rgba(245,166,35,0.3);
  color: var(--gold);
  padding: 7px 16px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fadeUp 0.6s ease both;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.8rem, 5vw, 4.2rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.08;
  letter-spacing: -1px;
  margin-bottom: 24px;
  animation: fadeUp 0.6s 0.1s ease both;
}

h1 span {
  color: var(--gold);
  position: relative;
}

.hero-sub {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
  max-width: 520px;
  margin-bottom: 40px;
  animation: fadeUp 0.6s 0.2s ease both;
  font-weight: 300;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  animation: fadeUp 0.6s 0.3s ease both;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--gold);
  color: var(--navy);
  padding: 15px 30px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  text-decoration: none;
  transition: all 0.25s;
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(245,166,35,0.35);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  padding: 15px 30px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.2);
  transition: all 0.25s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.4);
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 48px;
  animation: fadeUp 0.6s 0.4s ease both;
}

.stat {
  background: rgba(255,255,255,0.04);
  padding: 24px 20px;
  text-align: center;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Hero Right - Visual */
.hero-visual {
  position: relative;
  animation: fadeUp 0.8s 0.2s ease both;
}

.hero-card-main {
  background: linear-gradient(135deg, rgba(26,86,219,0.2), rgba(17,24,64,0.8));
  border: 1px solid rgba(26,86,219,0.3);
  border-radius: 20px;
  padding: 36px;
  backdrop-filter: blur(10px);
}

.hero-card-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-card-title::before {
  content: '';
  width: 20px; height: 2px;
  background: var(--gold);
}

.service-list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);
  font-size: 0.95rem;
  font-weight: 500;
}

.service-list-item:last-child { border-bottom: none; }

.service-icon {
  width: 36px; height: 36px;
  background: rgba(26,86,219,0.2);
  border: 1px solid rgba(26,86,219,0.4);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.floating-badge {
  position: absolute;
  bottom: -20px;
  right: -20px;
  background: var(--gold);
  color: var(--navy);
  padding: 16px 20px;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.8rem;
  text-align: center;
  line-height: 1.3;
  box-shadow: 0 10px 30px rgba(245,166,35,0.4);
}

/* ===== TRUST BAR ===== */
.trust-bar {
  background: var(--off-white);
  padding: 28px 5%;
  border-bottom: 1px solid #e8ecf4;
}

.trust-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--gray);
  font-size: 0.88rem;
  font-weight: 500;
}

.trust-icon {
  font-size: 1.3rem;
}

/* ===== SECTIONS ===== */
section { padding: 100px 5%; }

.section-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--blue);
  margin-bottom: 16px;
}

.section-tag::before {
  content: '';
  width: 16px; height: 2px;
  background: var(--blue);
}

h2 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  font-weight: 800;
  color: var(--navy);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-sub {
  font-size: 1.05rem;
  color: var(--gray);
  line-height: 1.7;
  max-width: 560px;
  font-weight: 300;
}

/* ===== SERVICES ===== */
#services { background: var(--white); }

.services-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 60px;
  gap: 30px;
  flex-wrap: wrap;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.scard {
  background: var(--card-bg);
  border: 1px solid #e8ecf4;
  border-radius: 16px;
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  cursor: default;
}

.scard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--blue-light));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}

.scard:hover {
  border-color: transparent;
  box-shadow: 0 20px 50px rgba(26,86,219,0.1);
  transform: translateY(-6px);
}

.scard:hover::before { transform: scaleX(1); }

.scard-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #eef2ff, #dbeafe);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.scard h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 10px;
}

.scard p {
  font-size: 0.9rem;
  color: var(--gray);
  line-height: 1.65;
  font-weight: 300;
}

/* ===== WHY US ===== */
#why {
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

#why .section-tag { color: var(--gold); }
#why .section-tag::before { background: var(--gold); }
#why h2 { color: var(--white); }
#why .section-sub { color: rgba(255,255,255,0.55); }

.why-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,86,219,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,86,219,0.06) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

.why-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.why-points {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.why-point {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.why-num {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: rgba(26,86,219,0.3);
  line-height: 1;
  min-width: 44px;
}

.why-text h4 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.why-text p {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
  font-weight: 300;
}

.why-visual {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px;
}

.process-step {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.process-step:last-child { border-bottom: none; }

.step-num {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  color: white;
  flex-shrink: 0;
}

.step-info h5 {
  font-family: 'Syne', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 3px;
}

.step-info p {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
}

/* ===== INDUSTRIES ===== */
#industries { background: var(--off-white); }

.ind-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 50px;
}

.ind-card {
  background: white;
  border: 1px solid #e8ecf4;
  border-radius: 14px;
  padding: 28px 22px;
  text-align: center;
  transition: all 0.3s;
}

.ind-card:hover {
  border-color: var(--blue);
  box-shadow: 0 10px 30px rgba(26,86,219,0.1);
  transform: translateY(-4px);
}

.ind-icon { font-size: 2.2rem; margin-bottom: 12px; }

.ind-card h4 {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 6px;
}

.ind-card p {
  font-size: 0.8rem;
  color: var(--gray);
  line-height: 1.5;
}

/* ===== CONTACT ===== */
#contact { background: var(--white); }

.contact-layout {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 60px;
  align-items: start;
}

.contact-info h2 { margin-bottom: 20px; }

.contact-info p {
  font-size: 1rem;
  color: var(--gray);
  line-height: 1.7;
  margin-bottom: 36px;
  font-weight: 300;
}

.contact-detail {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid #f0f2f7;
}

.contact-detail:last-of-type { border-bottom: none; }

.cicon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #eef2ff, #dbeafe);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.cinfo label {
  display: block;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--gray);
  font-weight: 600;
  margin-bottom: 3px;
}

.cinfo a, .cinfo span {
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  text-decoration: none;
  transition: color 0.2s;
}

.cinfo a:hover { color: var(--blue); }

/* Contact Form */
.contact-form {
  background: var(--off-white);
  border: 1px solid #e8ecf4;
  border-radius: 20px;
  padding: 40px;
}

.contact-form h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
}

.contact-form p {
  font-size: 0.88rem;
  color: var(--gray);
  margin-bottom: 28px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid #dde1ed;
  border-radius: 8px;
  font-size: 0.92rem;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(26,86,219,0.08);
}

.form-group textarea { resize: vertical; min-height: 110px; }

.form-submit {
  width: 100%;
  padding: 16px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.form-submit:hover {
  background: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(26,86,219,0.3);
}

.form-success {
  display: none;
  text-align: center;
  padding: 20px;
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 10px;
  color: #166534;
  font-weight: 600;
  margin-top: 16px;
}

/* ===== FOOTER ===== */
footer {
  background: var(--navy);
  color: rgba(255,255,255,0.6);
  padding: 70px 5% 30px;
}

.footer-top {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 50px;
  padding-bottom: 50px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.footer-brand .logo {
  font-size: 1.3rem;
  margin-bottom: 16px;
  display: inline-flex;
}

.footer-brand p {
  font-size: 0.88rem;
  line-height: 1.7;
  max-width: 260px;
  margin-top: 12px;
}

.footer-col h4 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: white;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 18px;
}

.footer-col ul { list-style: none; }

.footer-col ul li { margin-bottom: 10px; }

.footer-col ul li a {
  color: rgba(255,255,255,0.55);
  text-decoration: none;
  font-size: 0.88rem;
  transition: color 0.2s;
}

.footer-col ul li a:hover { color: white; }

.footer-bottom {
  max-width: 1100px;
  margin: 30px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 0.82rem;
}

/* ===== WHATSAPP ===== */
.wa-float {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.wa-label {
  background: white;
  color: #1a1a1a;
  padding: 10px 18px;
  border-radius: 30px;
  font-size: 0.88rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  opacity: 0;
  transform: translateX(10px);
  transition: all 0.3s;

  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }

.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
